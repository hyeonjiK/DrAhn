<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공지사항 - 안내과 의원</title>
    <meta name="theme-color" content="#2d8c8c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'IBM Plex Sans KR', 'Malgun Gothic', sans-serif; background: #f5f5f5; margin: 0 auto; }
        .page-wrapper { max-width: 480px; margin: 0 auto; }

        .header {
            background: linear-gradient(135deg, #2d8c8c 0%, #3da8a8 100%);
            color: white;
            text-align: center;
            padding: 10px 15px;
            font-size: 14px;
        }
        .header a { color: white; text-decoration: none; font-weight: bold; }

        .section {
            background: #fff;
            padding: 20px 15px;
            margin-bottom: 10px;
        }
        .section-title {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 8px;
            border-bottom: 2px solid #2d8c8c;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 글쓰기 버튼 */
        .write-btn {
            background: #2d8c8c;
            color: white;
            border: none;
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            border-radius: 4px;
            cursor: pointer;
        }
        .write-btn:hover { background: #247373; }

        /* 공지사항 목록 */
        .notice-list { list-style: none; }
        .notice-item {
            padding: 14px 0;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        .notice-item:last-child { border-bottom: none; }
        .notice-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .notice-item-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        .notice-item-date {
            font-size: 11px;
            color: #999;
            white-space: nowrap;
            margin-left: 10px;
        }
        .notice-item-content {
            display: none;
            font-size: 13px;
            color: #555;
            line-height: 1.8;
            padding: 12px;
            margin-top: 8px;
            background: #f9f9f9;
            border-radius: 6px;
            white-space: pre-wrap;
        }
        .notice-item.open .notice-item-content { display: block; }
        .notice-item.important .notice-item-title { color: #c0392b; }
        .badge {
            display: inline-block;
            font-size: 9px;
            padding: 1px 5px;
            border-radius: 2px;
            margin-left: 6px;
            color: white;
            vertical-align: middle;
        }
        .badge.important { background: #e74c3c; }
        .badge.new { background: #2d8c8c; }
        .notice-delete {
            background: none;
            border: 1px solid #ddd;
            color: #999;
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 3px;
            cursor: pointer;
            margin-top: 8px;
        }
        .notice-delete:hover { border-color: #e74c3c; color: #e74c3c; }

        .empty-notice {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 13px;
        }

        /* 모달 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #fff;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 25px 20px;
        }
        .modal h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 2px solid #2d8c8c;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }
        .form-group textarea {
            height: 150px;
            resize: vertical;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #2d8c8c;
        }
        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 18px;
        }
        .btn-submit {
            flex: 1;
            padding: 12px;
            background: #2d8c8c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-submit:hover { background: #247373; }
        .btn-cancel {
            flex: 1;
            padding: 12px;
            background: #eee;
            color: #666;
            border: none;
            border-radius: 5px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-cancel:hover { background: #ddd; }

        /* 홈 버튼 */
        .home-btn {
            display: block;
            background: #2d8c8c;
            color: white;
            text-align: center;
            padding: 14px;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            margin: 15px;
            border-radius: 5px;
        }
        .home-btn:active { background: #247373; }

        @media (min-width: 768px) {
            .page-wrapper { max-width: 420px; }
            .header { padding: 14px 20px; font-size: 16px; }
            .section { padding: 25px 20px; }
            .section-title { font-size: 18px; }
            .notice-item-title { font-size: 16px; }
            .notice-item-content { font-size: 14px; }
            .home-btn { margin: 20px; padding: 16px; font-size: 16px; }
        }

        @media (min-width: 1024px) {
            .page-wrapper { max-width: 480px; }
            .header { padding: 16px 30px; font-size: 17px; }
            .section { padding: 30px 40px; }
            .section-title { font-size: 20px; }
            .notice-item-title { font-size: 17px; }
            .notice-item-content { font-size: 15px; }
            .notice-item-date { font-size: 13px; }
            .home-btn { margin: 20px 40px; padding: 18px; font-size: 17px; }
        }

        @media (min-width: 1400px) {
            .page-wrapper { max-width: 540px; }
        }
    </style>
</head>
<body>
<div class="page-wrapper">
    <header class="header">
        빠른 진료 · 빠른 예약 <a href="tel:031-8027-8758">031-8027-8758</a>
    </header>

    <!-- 공지사항 -->
    <div class="section">
        <h2 class="section-title">
            공지사항
            <button class="write-btn" id="openWriteBtn">글쓰기</button>
        </h2>
        <ul class="notice-list" id="noticeList">
            <li class="empty-notice">공지사항을 불러오는 중...</li>
        </ul>
    </div>

    <a href="index.html" class="home-btn">홈으로 돌아가기</a>
</div>

<!-- 글쓰기 모달 -->
<div class="modal-overlay" id="writeModal">
    <div class="modal">
        <h3>공지사항 작성</h3>
        <div class="form-group">
            <label>관리자 비밀번호</label>
            <input type="password" id="adminPw" placeholder="비밀번호를 입력하세요">
        </div>
        <div class="form-group">
            <label>제목</label>
            <input type="text" id="noticeTitle" placeholder="공지사항 제목">
        </div>
        <div class="form-group">
            <label>내용</label>
            <textarea id="noticeContent" placeholder="공지사항 내용을 입력하세요"></textarea>
        </div>
        <div class="form-group">
            <label>중요 공지</label>
            <select id="noticeImportant">
                <option value="no">일반</option>
                <option value="yes">중요</option>
            </select>
        </div>
        <div class="form-actions">
            <button class="btn-submit" id="submitNotice">등록</button>
            <button class="btn-cancel" id="cancelWrite">취소</button>
        </div>
    </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal">
        <h3>공지사항 삭제</h3>
        <div class="form-group">
            <label>관리자 비밀번호</label>
            <input type="password" id="deletePw" placeholder="비밀번호를 입력하세요">
        </div>
        <div class="form-actions">
            <button class="btn-submit" id="confirmDelete" style="background:#e74c3c;">삭제</button>
            <button class="btn-cancel" id="cancelDelete">취소</button>
        </div>
    </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyAqz4aKsdx49fs3kusIHeJvaGIuSiFZi_I",
    authDomain: "ahnmedi.firebaseapp.com",
    projectId: "ahnmedi",
    storageBucket: "ahnmedi.firebasestorage.app",
    messagingSenderId: "107533313944",
    appId: "1:107533313944:web:fc8a54adf8a245062faded",
    measurementId: "G-STRGMJNX3C"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ─── 관리자 비밀번호 (변경하세요) ───
var ADMIN_PASSWORD = "ahn8758";

// ─── 공지사항 불러오기 ───
async function loadNotices() {
    var listEl = document.getElementById('noticeList');
    listEl.innerHTML = '<li class="empty-notice">불러오는 중...</li>';

    try {
        var q = query(collection(db, 'notices'), orderBy('createdAt', 'desc'));
        var snapshot = await getDocs(q);

        if (snapshot.empty) {
            listEl.innerHTML = '<li class="empty-notice">등록된 공지사항이 없습니다.</li>';
            return;
        }

        listEl.innerHTML = '';
        snapshot.forEach(function(docSnap) {
            var data = docSnap.data();
            var date = data.createdAt ? data.createdAt.toDate() : new Date();
            var dateStr = date.getFullYear() + '.' +
                String(date.getMonth() + 1).padStart(2, '0') + '.' +
                String(date.getDate()).padStart(2, '0');

            var isNew = (new Date() - date) < 7 * 24 * 60 * 60 * 1000;
            var li = document.createElement('li');
            li.className = 'notice-item' + (data.important ? ' important' : '');

            li.innerHTML =
                '<div class="notice-item-header">' +
                    '<span class="notice-item-title">' +
                        escapeHtml(data.title) +
                        (data.important ? '<span class="badge important">중요</span>' : '') +
                        (isNew ? '<span class="badge new">NEW</span>' : '') +
                    '</span>' +
                    '<span class="notice-item-date">' + dateStr + '</span>' +
                '</div>' +
                '<div class="notice-item-content">' +
                    escapeHtml(data.content) +
                    '<br><button class="notice-delete" data-id="' + docSnap.id + '">삭제</button>' +
                '</div>';

            li.querySelector('.notice-item-header').addEventListener('click', function() {
                li.classList.toggle('open');
            });

            li.querySelector('.notice-delete').addEventListener('click', function(e) {
                e.stopPropagation();
                deleteTargetId = docSnap.id;
                document.getElementById('deleteModal').classList.add('active');
                document.getElementById('deletePw').value = '';
                document.getElementById('deletePw').focus();
            });

            listEl.appendChild(li);
        });
    } catch (err) {
        listEl.innerHTML = '<li class="empty-notice">불러오기 실패: ' + err.message + '</li>';
    }
}

function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// ─── 글쓰기 ───
document.getElementById('openWriteBtn').addEventListener('click', function() {
    document.getElementById('writeModal').classList.add('active');
    document.getElementById('adminPw').value = '';
    document.getElementById('noticeTitle').value = '';
    document.getElementById('noticeContent').value = '';
    document.getElementById('noticeImportant').value = 'no';
    document.getElementById('adminPw').focus();
});

document.getElementById('cancelWrite').addEventListener('click', function() {
    document.getElementById('writeModal').classList.remove('active');
});

document.getElementById('submitNotice').addEventListener('click', async function() {
    var pw = document.getElementById('adminPw').value;
    var title = document.getElementById('noticeTitle').value.trim();
    var content = document.getElementById('noticeContent').value.trim();
    var important = document.getElementById('noticeImportant').value === 'yes';

    if (pw !== ADMIN_PASSWORD) {
        alert('비밀번호가 틀렸습니다.');
        return;
    }
    if (!title) {
        alert('제목을 입력하세요.');
        return;
    }
    if (!content) {
        alert('내용을 입력하세요.');
        return;
    }

    try {
        await addDoc(collection(db, 'notices'), {
            title: title,
            content: content,
            important: important,
            createdAt: new Date()
        });
        document.getElementById('writeModal').classList.remove('active');
        loadNotices();
    } catch (err) {
        alert('등록 실패: ' + err.message);
    }
});

// ─── 삭제 ───
var deleteTargetId = null;

document.getElementById('cancelDelete').addEventListener('click', function() {
    document.getElementById('deleteModal').classList.remove('active');
    deleteTargetId = null;
});

document.getElementById('confirmDelete').addEventListener('click', async function() {
    var pw = document.getElementById('deletePw').value;

    if (pw !== ADMIN_PASSWORD) {
        alert('비밀번호가 틀렸습니다.');
        return;
    }
    if (!deleteTargetId) return;

    try {
        await deleteDoc(doc(db, 'notices', deleteTargetId));
        document.getElementById('deleteModal').classList.remove('active');
        deleteTargetId = null;
        loadNotices();
    } catch (err) {
        alert('삭제 실패: ' + err.message);
    }
});

// 모달 바깥 클릭 시 닫기
document.getElementById('writeModal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('active');
});
document.getElementById('deleteModal').addEventListener('click', function(e) {
    if (e.target === this) { this.classList.remove('active'); deleteTargetId = null; }
});

// 초기 로드
loadNotices();
</script>
</body>
</html>
