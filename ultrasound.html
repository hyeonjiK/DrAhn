<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초음파 - 안내과 의원</title>
    <meta name="theme-color" content="#2d8c8c">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'IBM Plex Sans KR', 'Malgun Gothic', sans-serif; background: #f5f5f5; margin: 0 auto; }
        .page-wrapper { max-width: 480px; margin: 0 auto; }

        /* 상단 헤더 */
        .header {
            background: linear-gradient(135deg, #2d8c8c 0%, #3da8a8 100%);
            color: white;
            text-align: center;
            padding: 10px 15px;
            font-size: 14px;
        }
        .header a { color: white; text-decoration: none; font-weight: bold; }

        /* 페이지 타이틀 */
        .page-title {
            background: #fff;
            padding: 15px;
            border-bottom: 2px solid #8B7355;
        }
        .page-title h2 {
            font-size: 18px;
            color: #333;
        }

        /* 콘텐츠 영역 */
        .content-section {
            background: #fff;
            padding: 20px 15px;
        }

        /* 항목 */
        .ultra-item {
            margin-bottom: 18px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }
        .ultra-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }

        .ultra-title {
            font-size: 14px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .ultra-title .number {
            color: #2d8c8c;
            margin-right: 5px;
        }

        .ultra-desc {
            font-size: 12px;
            color: #666;
            line-height: 1.8;
            padding-left: 20px;
        }
        .ultra-desc span {
            display: block;
            padding-left: 20px;
            position: relative;
        }
        .ultra-desc span::before {
            content: '·';
            position: absolute;
            left: 8px;
            color: #2d8c8c;
            font-weight: bold;
        }

        /* 홈 버튼 */
        .home-btn {
            display: block;
            background: #2d8c8c;
            color: white;
            text-align: center;
            padding: 14px;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            margin: 15px;
            border-radius: 5px;
        }
        .home-btn:active {
            background: #247373;
        }

        /* 푸터 */
        .footer {
            background: #333;
            color: #aaa;
            padding: 15px;
            font-size: 11px;
            line-height: 1.6;
        }
        .footer p { margin-bottom: 3px; }

        /* 태블릿 (768px+) */
        @media (min-width: 768px) {
            .page-wrapper { max-width: 100%; }
            .header { padding: 14px 20px; font-size: 16px; }
            .page-title { padding: 20px; }
            .page-title h2 { font-size: 22px; }
            .content-section { padding: 25px 20px; }
            .ultra-title { font-size: 16px; }
            .ultra-desc { font-size: 14px; }
            .home-btn { margin: 20px; padding: 16px; font-size: 16px; }
            .footer { padding: 20px 25px; font-size: 13px; }
        }

        /* PC (1024px+) */
        @media (min-width: 1024px) {
            .page-wrapper { max-width: 100%; }
            .header { padding: 16px 30px; font-size: 17px; }
            .page-title { padding: 25px 40px; }
            .page-title h2 { font-size: 24px; }
            .content-section { padding: 35px 40px; }
            .ultra-title { font-size: 17px; }
            .ultra-desc { font-size: 15px; }
            .home-btn { margin: 20px 40px; padding: 18px; font-size: 17px; }
            .footer { padding: 25px 40px; font-size: 14px; }
        }

        /* 대형 (1400px+) */
        @media (min-width: 1400px) {
            .page-wrapper { max-width: 100%; }
        }
    </style>
</head>
<body>
<div class="page-wrapper">
    <!-- 상단 헤더 -->
    <header class="header">
        빠른 진료 · 빠른 예약 <a href="tel:031-8027-8758">031-8027-8758</a>
    </header>

    <!-- 페이지 타이틀 -->
    <div class="page-title">
        <h2>초음파</h2>
    </div>

    <!-- 콘텐츠 영역 -->
    <div class="content-section">
        <div class="ultra-item">
            <p class="ultra-title"><span class="number">1.</span> 복부 초음파</p>
            <div class="ultra-desc">
                <span>간질환 (지방간, 간경화, 간암, 간낭종)</span>
                <span>담낭 질환 (담석, 담낭염, 담낭 용종)</span>
                <span>담도 질환 (담관 결석, 담관 확장)</span>
                <span>췌장 질환 (췌장염, 췌장암, 췌장 낭종)</span>
                <span>비장 비대 및 비장 질환</span>
                <span>신장 질환 (신장 결석, 수신증, 신낭종, 신종양)</span>
                <span>복수 (배에 물이 참)</span>
                <span>복부 대동맥류</span>
                <span>복강 내 종괴</span>
            </div>
        </div>

        <div class="ultra-item">
            <p class="ultra-title"><span class="number">2.</span> 갑상선 초음파</p>
            <div class="ultra-desc">
                <span>갑상선 결절</span>
                <span>갑상선염</span>
                <span>갑상선 낭종</span>
                <span>갑상선암</span>
                <span>림프절 비대</span>
            </div>
        </div>

        <div class="ultra-item">
            <p class="ultra-title"><span class="number">3.</span> 경동맥 초음파</p>
            <div class="ultra-desc">
                <span>경동맥 협착</span>
                <span>동맥경화증</span>
                <span>혈전</span>
            </div>
        </div>

    </div>

    <!-- 홈 버튼 -->
    <a href="index.html" class="home-btn">홈으로 돌아가기</a>


</div>
</body>
</html>
